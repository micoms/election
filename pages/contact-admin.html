<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Admin | Student Council Election 2026</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="card">
        <div class="top-icon">✉️</div>

        <h1>Contact Admin</h1>
        <p class="subtitle">
            Reach the election support team for login issues,
            sign-up concerns, or ballot access assistance.
        </p>

        <label>Full Name</label>
        <div class="input-box">
            <input type="text" placeholder="e.g. Juan Dela Cruz">
        </div>

        <label>University Email</label>
        <div class="input-box">
            <input type="email" placeholder="e.g. juan@university.edu">
        </div>

        <label>Student ID</label>
        <div class="input-box">
            <input type="text" placeholder="e.g. 20248891">
        </div>

        <label>Concern</label>
        <div class="input-box">
            <input type="text" placeholder="e.g. Unable to access my ballot">
        </div>

        <label>Message</label>
        <div class="input-box">
            <textarea placeholder="Describe the issue you need help with."></textarea>
        </div>

        <a href="../index.html"><button>Send Message →</button></a>

        <p class="help">Need to return? <a href="../index.html">Back to Log In</a></p>
        <p class="help">Still creating an account? <a href="sign-up.html">Back to Sign Up</a></p>

        <div class="footer">
            <span class="footer-icon">●</span>
            Official University Portal &copy; 2026
        </div>
    </div>

</body>

</html>
