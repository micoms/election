<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Council Election 2026</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="card">
        <div class="top-icon">📝</div>

        <h1>Sign Up</h1>
        <p class="subtitle">
            Create your account to participate in the
            Student Council Election 2026.
        </p>

        <label>Full Name</label>
        <div class="input-box">
            <input type="text" placeholder="e.g. Juan Dela Cruz">
            <span class="icon">👤</span>
        </div>

        <label>Email</label>
        <div class="input-box">
            <input type="email" placeholder="e.g. juan@university.edu">
            <span class="icon">✉️</span>
        </div>

        <label>Student ID</label>
        <div class="input-box">
            <input type="text" placeholder="e.g. 20248891">
            <span class="icon">🪪</span>
        </div>

        <label>Password</label>
        <div class="input-box">
            <input type="password" placeholder="••••••••••">
            <span class="icon">👁</span>
        </div>

        <button href="../pages/dashboard.html">Sign Up →</button>

        <p class="help">Already have an account? <a href="../index.html">Log In</a></p>

        <div class="footer">
            <span class="footer-icon">●</span>
            Official University Portal © 2026
        </div>
    </div>

</body>

</html>
